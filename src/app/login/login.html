<div class="login-page">

  <div class="login-card">

    <div class="login-header">

      <div class="login-icon">
        <i class="fas fa-bus"></i>
      </div>

      <h1>ALSA Clean Fleet</h1>

      <p>
        Connectez-vous à votre espace administrateur
      </p>

    </div>


   <form (ngSubmit)="seConnecter()">

      <div class="form-group">

        <label>Email</label>

        <div class="input-box">

          <i class="fas fa-envelope"></i>

         <input type="email" name="email" [(ngModel)]="email" placeholder="admin@alsa.ma">

        </div>

      </div>



     <div class="form-group">

      <label>Mot de passe</label>

        <div class="input-box">

         <i class="fas fa-lock"></i>

          <input [type]="afficherMotDePasse ? 'text' : 'password'"name="password"[(ngModel)]="password"placeholder="********">
          <i class="fas"
             [class.fa-eye]="!afficherMotDePasse"
             [class.fa-eye-slash]="afficherMotDePasse"
             (click)="afficherMotDePasse = !afficherMotDePasse">
          </i>

    </div>

  </div>



     <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt"></i>
        Se connecter
      </button>


    </form>


  </div>

</div>
