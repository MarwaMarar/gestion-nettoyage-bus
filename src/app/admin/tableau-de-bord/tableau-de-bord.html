<div class="dashboard">

  <div class="welcome">
        <h2>Bienvenue, Administrateur 👋</h2>
        <p>Gérez les bus, les utilisateurs et les opérations de nettoyage.</p>
  </div>


  <div class="cards">

    <div class="card">
     <h3>🚌 Bus</h3>
      <p>{{ bus }}</p>
    </div>

    <div class="card">
      <h3>👤 Utilisateurs</h3>
      <p>{{ utilisateurs }}</p>
    </div>

    <div class="card">
       <h3>🧹 Nettoyages</h3>
      <p>{{ nettoyages }}</p>
    </div>

    <div class="card">
     <h3>📊 Rapports</h3>
      <p>{{ rapports }}</p>
    </div>

  </div>

</div>
