spring.application.name=alsa-clean-fleet

# ============================================
# MySQL DataSource
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/alsa_clean_fleet?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Renseignez ici le mot de passe de votre instance MySQL si necessaire.
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================
# Server
# ============================================
server.port=8080
