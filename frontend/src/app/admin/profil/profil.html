
<div class="profil">


  <div class="header-page">

    <div class="header-page-left">

      <h2>
        <i class="fa-solid fa-user"></i>
        Mon Profil
      </h2>

      <p>
        Gestion des informations de l'administrateur
      </p>

    </div>

  </div>



  <!-- Profil Card -->
  <div class="profil-card">


    <div class="profil-top">

      <div class="profil-avatar">
        AD
      </div>


      <div class="profil-name">

        <h3>
          Administrateur
        </h3>

        <span>
          Super Admin
        </span>

      </div>


    </div>

    <!-- Formulaire Modifier Profil -->

<div class="form-card" *ngIf="modifierOuvert">

  <h3>
    Modifier mes informations
  </h3>


  <div class="form-group">

    <label>Nom complet</label>

    <input
      type="text"
      [(ngModel)]="nom">

  </div>


  <div class="form-group">

    <label>Email</label>

    <input
      type="email"
      [(ngModel)]="email">

  </div>


  <div class="form-group">

    <label>Téléphone</label>

    <input
      type="tel"
      [(ngModel)]="telephone">

  </div>



  <div class="form-buttons">

    <button
      class="btn-save"
      (click)="sauvegarderProfil()">

      Enregistrer

    </button>


    <button
      class="btn-cancel"
      (click)="fermer()">

      Annuler

    </button>


  </div>


</div>





<!-- Formulaire Changer mot de passe -->

<div class="form-card" *ngIf="motDePasseOuvert">


  <h3>
    Changer le mot de passe
  </h3>



  <div class="form-group">

    <label>Ancien mot de passe</label>

    <div class="password-box">

  <input
    [type]="voirAncien ? 'text' : 'password'"
    [(ngModel)]="ancienMotDePasse">


  <i
    class="fa-solid"
    [class.fa-eye]="!voirAncien"
    [class.fa-eye-slash]="voirAncien"
    (click)="toggleAncien()">
  </i>

</div>

  </div>



  <div class="form-group">

    <label>Nouveau mot de passe</label>

   <div class="password-box">

  <input
    [type]="voirNouveau ? 'text' : 'password'"
    [(ngModel)]="nouveauMotDePasse">


  <i
    class="fa-solid"
    [class.fa-eye]="!voirNouveau"
    [class.fa-eye-slash]="voirNouveau"
    (click)="toggleNouveau()">
  </i>

</div>

  </div>



  <div class="form-group">

    <label>Confirmer mot de passe</label>

    <div class="password-box">

  <input
    [type]="voirConfirmation ? 'text' : 'password'"
    [(ngModel)]="confirmerMotDePasse">


  <i
    class="fa-solid"
    [class.fa-eye]="!voirConfirmation"
    [class.fa-eye-slash]="voirConfirmation"
    (click)="toggleConfirmation()">
  </i>

</div>

  </div>



  <div class="form-buttons">


    <button
      class="btn-save"
      (click)="changerMotDePasse()">

      Modifier

    </button>


    <button
      class="btn-cancel"
      (click)="fermer()">

      Annuler

    </button>


  </div>


</div>


    <div class="profil-info">


      <div class="info-item">

        <i class="fa-solid fa-user"></i>

        <div>
          <label>Nom complet</label>
          <p>Administrateur</p>
        </div>

      </div>



      <div class="info-item">

        <i class="fa-solid fa-envelope"></i>

        <div>
          <label>Email</label>
          <p>admin@alsaclean.com</p>
        </div>

      </div>



      <div class="info-item">

        <i class="fa-solid fa-phone"></i>

        <div>
          <label>Téléphone</label>
          <p>06 00 00 00 00</p>
        </div>

      </div>



      <div class="info-item">

        <i class="fa-solid fa-shield-halved"></i>

        <div>
          <label>Rôle</label>
          <p>Super Admin</p>
        </div>

      </div>


    </div>



    <div class="profil-actions">


  <button
    class="btn-modifier"
    (click)="ouvrirModifier()">

    <i class="fa-solid fa-pen"></i>

    Modifier profil

  </button>


  <button
    class="btn-password"
    (click)="ouvrirMotDePasse()">

    <i class="fa-solid fa-lock"></i>

    Changer mot de passe

  </button>


</div>


  </div>


</div>
